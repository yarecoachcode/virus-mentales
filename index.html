<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explorador de Virus Mentales</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
const { useState } = React;

const PARTS = [
  {
    id: "bloqueos", name: "Bloqueos Inconscientes", emoji: "🔒",
    color: "#6366f1", g: ["#6366f1","#8b5cf6"],
    subs: [
      { name: "Sindrome del Impostor", questions: ["Me cuesta aceptar cumplidos o reconocimientos.","Siento que mis logros han sido por suerte.","A menudo pienso que no estoy lo suficientemente preparado/a.","Tengo miedo de que otros descubran que no se tanto."]},
      { name: "Miedo al Fracaso", questions: ["Pienso mucho en lo que podria salir mal.","Me paralizo cuando tengo que tomar una gran decision.","Prefiero no intentarlo antes que fallar.","Me autoexijo demasiado por miedo a equivocarme."]},
      { name: "Miedo al Exito", questions: ["Me asusta lo que pueda cambiar si tengo exito.","Me saboteo cuando las cosas empiezan a ir bien.","Siento culpa por avanzar mas que otros.","Me da miedo no poder sostener el exito."]},
      { name: "Visibilidad", questions: ["Me incomoda hablar de mis logros.","Evito mostrarme en redes sociales.","Me da miedo hacer lives o grabarme.","Siento ansiedad cuando pienso en exponerme."]},
      { name: "Autoestima y Valor Personal", questions: ["Me cuesta reconocer mis fortalezas.","Dudo de mi capacidad para tener exito.","Necesito que me validen para sentirme seguro/a.","Me siento menos que otras personas."]},
    ],
  },
  {
    id: "heridas", name: "Heridas de la Infancia", emoji: "💔",
    color: "#f59e0b", g: ["#f59e0b","#ef4444"],
    subs: [
      { name: "Herida de Rechazo", questions: ["Me cuesta aceptar que soy importante para los demas.","Prefiero pasar desapercibido/a en los grupos.","Me da miedo sobresalir o destacar.","Meaislo cuando me siento inseguro/a."]},
      { name: "Herida de Abandono", questions: ["Me cuesta estar solo/a sin sentir ansiedad.","Necesito tener a alguien que me apoye todo el tiempo.","Me siento vacio/a cuando estoy sin compania.","Me aferro a personas aunque no me hagan bien."]},
      { name: "Herida de Humillacion", questions: ["Me avergüenzo facilmente de lo que hago o digo.","Casi nunca pido ayuda, prefiero cargar con todo.","Me siento culpable por desear cosas para mi.","Tolero mucho por miedo a molestar a los demas."]},
      { name: "Herida de Traicion", questions: ["Me cuesta confiar en las personas.","Me molesta que otros no hagan las cosas como yo.","Prefiero hacer las cosas solo/a para asegurarme que salgan bien.","Me frustra mucho la falta de compromiso en los demas."]},
      { name: "Herida de Injusticia", questions: ["Me exijo demasiado a mi mismo/a.","No me permito mostrar debilidad.","Me molesta mucho la mediocridad.","Prefiero hacer las cosas yo porque los demas no las hacen bien."]},
    ],
  },
  {
    id: "interferencias", name: "Interferencias Inconscientes", emoji: "⚡",
    color: "#10b981", g: ["#10b981","#06b6d4"],
    subs: [
      { name: "Debo pagar lo que hice", questions: ["Me cuesta disfrutar sin sentir culpa.","Siento que tengo que esforzarme mucho para merecer algo.","Me saboteo cuando algo bueno esta por llegar.","Me siento en deuda con los demas."]},
      { name: "Soy un perdedor", questions: ["Siento que no soy tan bueno/a como los demas.","Siempre dudo de que voy a lograrlo.","Pienso que fracasar es lo normal para mi.","Me cuesta mantener el entusiasmo por mis proyectos."]},
      { name: "No lo merezco", questions: ["Me incomoda cuando me felicitan.","Siento que no soy suficiente para cobrar bien.","Me cuesta permitirme disfrutar de cosas buenas.","Me autoexijo demasiado para merecer descansar."]},
      { name: "No se hacerlo bien", questions: ["Me paralizo cuando enfrento algo nuevo.","Siento que no tengo lo necesario para emprender.","Me cuesta avanzar si no tengo todo claro.","Prefiero que otros lideren."]},
      { name: "Hago dano a los demas", questions: ["Me da miedo ser exitoso/a y que los demas se alejen.","Siento que al cobrar mucho, estoy abusando.","No quiero liderar porque me da miedo imponerme.","Me da culpa tener mas que otros."]},
    ],
  },
];

const ALL_Q = [];
PARTS.forEach((p, pi) => p.subs.forEach((s, si) => s.questions.forEach((q) => ALL_Q.push({ text: q, partIndex: pi, subIndex: si, subName: s.name }))));
const TOTAL = ALL_Q.length;
const SCALE = [{ value: 0, label: "Nunca", emoji: "😌" },{ value: 3, label: "A veces", emoji: "😐" },{ value: 5, label: "Siempre", emoji: "😣" }];

const getLevel = (score, max) => {
  const pct = score / max;
  if (pct < 0.4) return { label: "Latente", color: "#10b981" };
  if (pct < 0.7) return { label: "Activo", color: "#f59e0b" };
  return { label: "Dominante", color: "#ef4444" };
};

function BarChart({ data }) {
  return (
    <div style={{padding:"8px 0"}}>
      {data.map((d, i) => (
        <div key={i} style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>{d.emoji} {d.label}</span>
            <span style={{fontSize:14,fontWeight:900,color:d.color}}>{d.score}%</span>
          </div>
          <div style={{background:"#f1f5f9",borderRadius:99,height:16,overflow:"hidden"}}>
            <div style={{width:d.score+"%",height:"100%",borderRadius:99,background:"linear-gradient(90deg,"+d.color+","+d.color2+")"}} />
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("welcome");
  const [cur, setCur] = useState(0);
  const [answers, setAnswers] = useState({});
  const [selected, setSelected] = useState(null);
  const [visible, setVisible] = useState(true);
  const [userInfo, setUserInfo] = useState({ name: "", email: "" });
  const [sending, setSending] = useState(false);

  const q = ALL_Q[cur] || {};
  const part = PARTS[q.partIndex] || PARTS[0];
  const progress = (cur / TOTAL) * 100;

  const partScores = PARTS.map((p, pi) => {
    let total = 0, max = 0;
    const subScores = p.subs.map((s, si) => {
      let sub = 0;
      s.questions.forEach((qq) => {
        const idx = ALL_Q.findIndex(item => item.partIndex === pi && item.subIndex === si && item.text === qq);
        sub += answers[idx] || 0;
      });
      max += s.questions.length * 5;
      total += sub;
      return { name: s.name, score: sub, max: s.questions.length * 5, ...getLevel(sub, s.questions.length * 5) };
    });
    return { ...p, score: total, max, subScores, ...getLevel(total, max) };
  });

  const chartData = partScores.map(p => ({ label: p.name.split(" ")[0], score: Math.round((p.score/p.max)*100), color: p.color, color2: p.g[1], emoji: p.emoji }));
  const dominant = [...partScores].sort((a,b) => b.score/b.max - a.score/a.max)[0];

  const handleShowResults = async () => {
    if (!userInfo.name || !userInfo.email) return;
    setSending(true);
    try {
      await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_key: "d5049613-19d0-4df9-8a2a-683d81ac46f4",
          subject: "Nuevo Test - " + userInfo.name,
          from_name: userInfo.name,
          email: userInfo.email,
          bloqueos: partScores[0].score + "/" + partScores[0].max + " (" + partScores[0].label + ")",
          heridas: partScores[1].score + "/" + partScores[1].max + " (" + partScores[1].label + ")",
          interferencias: partScores[2].score + "/" + partScores[2].max + " (" + partScores[2].label + ")",
          subcategorias: partScores.map(p => p.name + ": " + p.subScores.map(s => s.name + "=" + s.score + "/" + s.max + "(" + s.label + ")").join(", ")).join(" | "),
          respuestas: ALL_Q.map((q, idx) => "P"+(idx+1)+":"+(answers[idx]||0)).join(", "),
        }),
      });
    } catch(e) { console.error(e); }
    setSending(false);
    setScreen("results");
  };

  const go = (val) => {
    setSelected(val);
    setTimeout(() => {
      setVisible(false);
      setTimeout(() => {
        setAnswers(prev => ({ ...prev, [cur]: val }));
        if (cur + 1 < TOTAL) { setCur(c => c+1); setSelected(null); }
        else setScreen("capture");
        setVisible(true);
      }, 280);
    }, 180);
  };

  const card = { background:"white", borderRadius:24, boxShadow:"0 4px 24px rgba(0,0,0,0.08)", padding:24, marginBottom:16 };

  if (screen === "welcome") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#f8fafc"}}>
      <div style={{maxWidth:440,width:"100%",textAlign:"center"}}>
        <div style={{width:96,height:96,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,margin:"0 auto 24px"}}>🧠</div>
        <h1 style={{fontSize:36,fontWeight:900,color:"#1e293b",lineHeight:1.2,marginBottom:12}}>Explorador de<br/><span style={{color:"#6366f1"}}>Virus Mentales</span></h1>
        <p style={{color:"#64748b",fontSize:16,lineHeight:1.6,marginBottom:24}}>Descubre los patrones invisibles que frenan tu crecimiento personal y profesional.</p>
        <div style={{...card,textAlign:"left"}}>
          {[["🔒","Bloqueos Inconscientes","20 preguntas"],["💔","Heridas de la Infancia","20 preguntas"],["⚡","Interferencias Inconscientes","20 preguntas"]].map(function(item){return (
            <div key={item[1]} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <span style={{fontSize:24}}>{item[0]}</span>
              <div><div style={{fontWeight:700,color:"#334155",fontSize:14}}>{item[1]}</div><div style={{color:"#94a3b8",fontSize:12}}>{item[2]}</div></div>
            </div>
          );})}
        </div>
        <p style={{color:"#94a3b8",fontSize:12,marginBottom:16}}>60 preguntas · 8 minutos · Resultados inmediatos</p>
        <button onClick={function(){setScreen("quiz");}} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",border:"none",borderRadius:16,padding:"16px 24px",fontWeight:800,fontSize:16,cursor:"pointer",width:"100%"}}>Iniciar Viaje</button>
        <p style={{color:"#94a3b8",fontSize:12,marginTop:12}}>Confidencial - Sin registro requerido</p>
      </div>
    </div>
  );

  if (screen === "quiz") return (
    <div style={{minHeight:"100vh",padding:16,background:"#f8fafc"}}>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}>
            <span style={{fontWeight:700,color:part.color}}>{part.emoji} {part.name}</span>
            <span style={{color:"#94a3b8"}}>{cur+1} / {TOTAL}</span>
          </div>
          <div style={{background:"#e2e8f0",borderRadius:99,height:8}}>
            <div style={{width:progress+"%",height:8,borderRadius:99,background:"linear-gradient(90deg,"+part.g[0]+","+part.g[1]+")"}} />
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{q.subName}</div>
        </div>

        <div style={{opacity:visible?1:0,transition:"opacity 0.28s ease"}}>
          <div style={card}>
            <p style={{fontSize:18,fontWeight:600,color:"#1e293b",lineHeight:1.5}}>{q.text}</p>
          </div>
          <div style={card}>
            <p style={{fontSize:12,color:"#94a3b8",textAlign:"center",marginBottom:16}}>Con que frecuencia te identificas?</p>
            <div style={{display:"flex",gap:8}}>
              {SCALE.map(function(s){ return (
                <button key={s.value} onClick={function(){go(s.value);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"14px 8px",borderRadius:14,border:"2px solid "+(selected===s.value?part.color:"#e2e8f0"),background:selected===s.value?part.color+"18":"white",cursor:"pointer"}}>
                  <span style={{fontSize:28}}>{s.emoji}</span>
                  <span style={{fontSize:20,fontWeight:900,color:selected===s.value?part.color:"#94a3b8"}}>{s.value}</span>
                  <span style={{fontSize:11,color:"#94a3b8",textAlign:"center"}}>{s.label}</span>
                </button>
              );})}
            </div>
          </div>
          {cur > 0 && <button onClick={function(){setCur(function(c){return c-1;}); setSelected(answers[cur-1]||null);}} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",cursor:"pointer",padding:"8px 0",fontSize:14}}>Pregunta anterior</button>}
        </div>
      </div>
    </div>
  );

  if (screen === "capture") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#f8fafc"}}>
      <div style={{maxWidth:440,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 16px"}}>🎉</div>
          <h2 style={{fontSize:28,fontWeight:900,color:"#1e293b",marginBottom:8}}>Test completado!</h2>
          <p style={{color:"#64748b",fontSize:14}}>Ingresa tus datos para ver tu diagnostico personalizado</p>
        </div>
        <div style={card}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:700,color:"#475569",display:"block",marginBottom:6}}>Nombre completo</label>
            <input type="text" placeholder="Tu nombre" value={userInfo.name} onChange={function(e){setUserInfo(function(p){return {...p,name:e.target.value};});}}
              style={{width:"100%",border:"2px solid #e2e8f0",borderRadius:12,padding:"12px 16px",fontSize:15,outline:"none",color:"#334155"}} />
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:13,fontWeight:700,color:"#475569",display:"block",marginBottom:6}}>Correo electronico</label>
            <input type="email" placeholder="tu@correo.com" value={userInfo.email} onChange={function(e){setUserInfo(function(p){return {...p,email:e.target.value};});}}
              style={{width:"100%",border:"2px solid #e2e8f0",borderRadius:12,padding:"12px 16px",fontSize:15,outline:"none",color:"#334155"}} />
          </div>
          <button onClick={handleShowResults} disabled={!userInfo.name||!userInfo.email||sending}
            style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",border:"none",borderRadius:16,padding:"16px 24px",fontWeight:800,fontSize:16,cursor:"pointer",width:"100%",opacity:(!userInfo.name||!userInfo.email)?0.4:1}}>
            {sending ? "Enviando..." : "Ver mi Diagnostico"}
          </button>
          <p style={{color:"#94a3b8",fontSize:12,textAlign:"center",marginTop:12}}>Tu informacion es confidencial</p>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",padding:16,background:"#f8fafc"}}>
      <div style={{maxWidth:640,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 12px"}}>🧬</div>
          <h2 style={{fontSize:32,fontWeight:900,color:"#1e293b",marginBottom:4}}>Tu Diagnostico Mental</h2>
          <p style={{color:"#64748b",fontSize:14}}>Hola {userInfo.name} - Test Integral de Reprogramacion Mental</p>
        </div>

        <div style={card}>
          <h3 style={{fontWeight:800,color:"#334155",textAlign:"center",marginBottom:16,fontSize:13,textTransform:"uppercase",letterSpacing:1}}>Mapa de Intensidad</h3>
          <BarChart data={chartData} />
        </div>

        {partScores.map(function(p){ return (
          <div key={p.id} style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:20}}>{p.emoji}</span>
                  <h4 style={{fontWeight:800,color:"#1e293b",fontSize:16}}>{p.name}</h4>
                </div>
                <span style={{fontSize:12,fontWeight:700,padding:"3px 12px",borderRadius:99,background:p.color+"20",color:p.color}}>{p.label}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:32,fontWeight:900,color:p.color}}>{p.score}</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>/ {p.max}</div>
              </div>
            </div>
            <div style={{background:"#f1f5f9",borderRadius:99,height:10,marginBottom:16,overflow:"hidden"}}>
              <div style={{width:(p.score/p.max*100)+"%",height:"100%",borderRadius:99,background:"linear-gradient(90deg,"+p.g[0]+","+p.g[1]+")"}} />
            </div>
            {p.subScores.map(function(s){ return (
              <div key={s.name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{fontSize:12,color:"#64748b",width:160,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                <div style={{flex:1,background:"#f1f5f9",borderRadius:99,height:6,overflow:"hidden"}}>
                  <div style={{width:(s.score/s.max*100)+"%",height:"100%",borderRadius:99,background:s.color}} />
                </div>
                <span style={{fontSize:11,fontWeight:700,color:s.color,width:52,textAlign:"right"}}>{s.label}</span>
              </div>
            );})}
          </div>
        );})}

        <div style={{...card,borderLeft:"4px solid #6366f1"}}>
          <h3 style={{fontWeight:800,color:"#1e293b",marginBottom:8}}>Diagnostico Rapido</h3>
          <p style={{color:"#475569",lineHeight:1.6,fontSize:14}}>
            Tu area de mayor intensidad es <strong style={{color:dominant.color}}>{dominant.name}</strong> con nivel <strong>{dominant.label}</strong>. Los patrones detectados operan en segundo plano influyendo en tus decisiones y resultados. La buena noticia: todo esto es reprogramable.
          </p>
        </div>

        <div style={{borderRadius:24,padding:32,textAlign:"center",marginBottom:24,background:"linear-gradient(135deg,#eef2ff,#f5f3ff)",border:"1px solid #c7d2fe"}}>
          <h3 style={{fontSize:24,fontWeight:900,color:"#1e293b",marginBottom:8}}>Tu Proximo Paso</h3>
          <p style={{color:"#475569",fontSize:14,lineHeight:1.6,marginBottom:24}}>Ahora tienes claridad sobre tus patrones mentales. En 15 minutos podemos crear un plan de accion personalizado para iniciar tu proceso de reprogramacion.</p>
          <a href="https://calendar.app.google/LUPbVy9CGFr2sWU98" target="_blank"
            style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",borderRadius:16,padding:"16px 24px",fontWeight:800,fontSize:16,textDecoration:"none",display:"block",textAlign:"center"}}>
            Agendar Sesion de Claridad (15 min)
          </a>
          <p style={{color:"#94a3b8",fontSize:12,marginTop:12}}>Sesion gratuita - Sin compromiso</p>
        </div>

        <button onClick={function(){setScreen("welcome");setCur(0);setAnswers({});setSelected(null);}}
          style={{width:"100%",padding:"12px 0",borderRadius:16,border:"1px solid #e2e8f0",background:"white",color:"#94a3b8",cursor:"pointer",fontSize:14,marginBottom:32}}>
          Reiniciar test
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
